<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de Procedimentos | Amanda Nails</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Nunito', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #fdeeee 0%, #ffd9e2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #c95f84;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.55);
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(225, 119, 155, 0.15);
      backdrop-filter: blur(10px);
    }

    .top {
      text-align: center;
      margin-bottom: 24px;
    }

    .top h1 {
      font-size: 1.9rem;
      color: #d45f84;
      margin-bottom: 8px;
      font-weight: 800;
    }

    .top p {
      color: #d97898;
      font-weight: 700;
      font-size: 1rem;
    }

    .actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 24px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 220px;
      position: relative;
      overflow: hidden;
      text-decoration: none;
      padding: 16px 60px 16px 20px;
      border-radius: 18px;
      font-weight: 800;
      font-size: 1rem;
      background: linear-gradient(180deg, #ffd6df 0%, #f7c2cf 100%);
      color: #c94f77;
      box-shadow: 0 6px 0 #df7e9d;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 9px 0 #df7e9d;
      filter: brightness(1.02);
    }

    .btn.clicking {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #df7e9d;
      filter: brightness(0.98);
    }

    .mini-btn-img {
      position: absolute;
      top: 50%;
      right: 10px;
      width: 52px;
      height: auto;
      transform: translateY(-50%) scale(0.8);
      opacity: 0;
      transition: all 0.28s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.08));
    }

    .btn:hover .mini-btn-img,
    .btn.clicking .mini-btn-img {
      opacity: 1;
      right: 14px;
      transform: translateY(-50%) scale(1);
    }

    .pdf-container {
      padding: 12px;
      border-radius: 24px;
      background: linear-gradient(135deg, #ffd6df, #fbcbd4);
      box-shadow: 0 12px 30px rgba(225, 119, 155, 0.18);
    }

    .viewer {
      width: 100%;
      height: 78vh;
      border: none;
      border-radius: 18px;
      background: white;
      box-shadow: 0 15px 40px rgba(225, 119, 155, 0.2);
      overflow: hidden;
    }

    .fallback {
      margin-top: 16px;
      text-align: center;
      color: #c96a8a;
      font-weight: 700;
      line-height: 1.5;
      background: #fff7fa;
      padding: 14px;
      border-radius: 14px;
    }

    @media (max-width: 768px) {
      .page {
        padding: 18px;
      }

      .top h1 {
        font-size: 1.5rem;
      }

      .top p {
        font-size: 0.95rem;
      }

      .btn {
        width: 100%;
        min-width: unset;
      }

      .viewer {
        height: 65vh;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 12px;
      }

      .page {
        padding: 14px;
        border-radius: 22px;
      }

      .btn {
        padding: 15px 52px 15px 16px;
        font-size: 0.95rem;
      }

      .mini-btn-img {
        width: 44px;
      }

      .viewer {
        height: 58vh;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="top">
      <h1>Catálogo de Procedimentos</h1>
      <p>Veja online ou baixe o PDF no seu dispositivo</p>
    </div>

    <div class="actions">
      <a href="catalogo.pdf" target="_blank" class="btn js-link">
        📖 Ver em nova aba
        <img src="mini_amanda-removebg-preview.png" alt="" class="mini-btn-img">
      </a>

      <a href="catalogo.pdf" download class="btn js-link">
        ⬇️ Baixar PDF
        <img src="mini_amanda-removebg-preview.png" alt="" class="mini-btn-img">
      </a>

      <a href="index.html" class="btn js-link">
        💅 Voltar ao site
        <img src="mini_amanda-removebg-preview.png" alt="" class="mini-btn-img">
      </a>
    </div>

    <div class="pdf-container">
      <iframe
        src="catalogo.pdf#toolbar=0&navpanes=0&scrollbar=0"
        class="viewer"
        title="Catálogo Amanda Nails">
      </iframe>
    </div>

    <div class="fallback">
      Se o PDF não aparecer direitinho no seu navegador, use os botões acima para abrir em nova aba ou baixar.
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
